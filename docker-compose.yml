services:
  # --- UI & Streaming Service ---
  cinema-web:
    build:
      context: .
      args:
        - NEXT_PUBLIC_WS_URL=https://wss-watch.jithufrancis.com
    container_name: cinema-frontend
    ports:
      - "3010:3000"
    volumes:
      - ./movies:/app/movies:ro
    environment:
      - NEXT_PUBLIC_WS_URL=https://wss-watch.jithufrancis.com
      - JWT_SECRET=${JWT_SECRET}
      - STREAM_PASSWORD=${STREAM_PASSWORD}
      - MOVIE_PATH=/app/movies/movie.mp4
      - MOVIE_TITLE=${MOVIE_TITLE}
      - MOVIE_DESCRIPTION=${MOVIE_DESCRIPTION}
      - MOVIE_POSTER=${MOVIE_POSTER}
    deploy:
      resources:
        limits:
          memory: 512M      # ⛔ Hard cap: Container is killed if it hits this
        reservations:
          memory: 256M      # ✅ Soft floor: Docker tries to guarantee this much
    restart: unless-stopped

  # --- Real-Time Sync & Chat Service ---
  cinema-socket:
    build: .
    container_name: cinema-socket
    command: ["./start.sh", "socket"]
    ports:
      - "8010:8010"
    environment:
      - WS_PORT=8010
      - CORS_ORIGIN=https://watch.jithufrancis.com
      - JWT_SECRET=${JWT_SECRET}
      - STREAM_PASSWORD=${STREAM_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 128M      # Sockets are lightweight, 128MB is plenty
        reservations:
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s         # Increased interval to save CPU/RAM
      retries: 3