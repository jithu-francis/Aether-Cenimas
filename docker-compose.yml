# ═══════════════════════════════════════════════════
# Aether Cinema — Docker Compose (Dual-Container)
# ═══════════════════════════════════════════════════
#
# Usage:
#   docker compose up -d --build
#
# Prerequisites:
#   1. Place your movie file at: ./movies/movie.mp4
#   2. Create a .env file (see .env.example)
#
# Architecture:
#   cinema-web    → Next.js frontend (port 3010 → 3000)
#   cinema-socket → Socket.io server  (port 8010 → 8010)
#
# ═══════════════════════════════════════════════════

services:
  # --- SERVICE 1: THE FRONTEND (UI & Streaming) ---
  cinema-web:
    build:
      context: .
      args:
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-http://localhost:8010}
    container_name: cinema-frontend
    ports:
      - "3010:3000"
    volumes:
      - ./movies:/app/movies:ro
      - ./public/poster.webp:/app/public/poster.webp:ro
    environment:
      - STREAM_PASSWORD=${STREAM_PASSWORD:-aether2024}
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-32-char-secret-key}
      - MOVIE_TITLE=${MOVIE_TITLE:-I Am Kathalan}
      - MOVIE_DESCRIPTION=${MOVIE_DESCRIPTION:-A gripping cyber thriller following Vishnu, an engineering graduate who uses his hacking skills for revenge.}
      - MOVIE_POSTER=${MOVIE_POSTER:-/poster.webp}
      - MOVIE_PATH=/app/movies/movie.mp4
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-http://localhost:8010}
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 600M
        reservations:
          memory: 200M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  # --- SERVICE 2: THE SOCKET (Sync & Chat) ---
  cinema-socket:
    build:
      context: .
    container_name: cinema-socket
    command: node server/index.js
    ports:
      - "8010:8010"
    environment:
      - WS_PORT=8010
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
