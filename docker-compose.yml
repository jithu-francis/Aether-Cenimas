# ═══════════════════════════════════════════════════
# Aether Cinema — Docker Compose
# ═══════════════════════════════════════════════════
#
# Usage:
#   docker compose up -d --build
#
# Prerequisites:
#   1. Place your movie file at: ./movies/movie.mp4
#   2. Create a .env file (see .env.example)
#
# ═══════════════════════════════════════════════════

services:
  aether-cinema:
    build: .
    container_name: aether-cinema
    ports:
      - "3010:3000"    # Next.js frontend
      - "8010:8010"    # Socket.io WebSocket server
    volumes:
      - ./movies:/app/movies:ro
    environment:
      - STREAM_PASSWORD=${STREAM_PASSWORD:-aether2024}
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-32-char-secret-key}
      - MOVIE_TITLE=${MOVIE_TITLE:-I Am Kathalan}
      - MOVIE_DESCRIPTION=${MOVIE_DESCRIPTION:-A gripping cyber thriller following Vishnu, an engineering graduate who uses his hacking skills for revenge.}
      - MOVIE_POSTER=${MOVIE_POSTER:-/poster.png}
      - MOVIE_PATH=/app/movies/movie.mp4
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-http://localhost:8010}
      - WS_PORT=8010
      - CORS_ORIGIN=*
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
